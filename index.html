<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Railway Station · 3D Digital Twin</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#dce8f0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  #title {
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    color:#1a1a2e; font-size:18px; font-weight:700; letter-spacing:0.5px;
    background:rgba(255,255,255,0.88); padding:9px 22px; border-radius:8px;
    pointer-events:none; backdrop-filter:blur(12px);
    border:1px solid rgba(0,0,0,0.06); box-shadow:0 2px 12px rgba(0,0,0,0.05);
  }
  #title span { color:#3370ff; }

  .hint {
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    color:rgba(0,0,0,0.3); font-size:11px; pointer-events:none; letter-spacing:0.3px;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.35; transform:scale(1.25); }
  }

  .side-panel {
    position:absolute; top:100px; bottom:30px; width:240px;
    background:rgba(255,255,255,0.9); backdrop-filter:blur(16px);
    border:1px solid rgba(0,0,0,0.06); border-radius:12px;
    padding:0; display:flex; flex-direction:column;
    z-index:10; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.04);
  }
  .panel-left { left:14px; }
  .panel-right { right:14px; }

  .panel-header {
    padding:13px 14px 11px;
    font-size:13px; font-weight:700; color:#1a1a2e;
    border-bottom:1px solid rgba(0,0,0,0.06);
    display:flex; align-items:center; gap:7px; letter-spacing:0.3px;
  }
  .panel-header .dot { width:8px; height:8px; border-radius:50%; }
  .dot.green { background:#34a853; }
  .dot.amber { background:#fbbc04; }
  .dot.red { background:#ea4335; animation:pulse 2s infinite; }

  .panel-list { flex:1; overflow-y:auto; padding:6px; }
  .panel-list::-webkit-scrollbar { width:4px; }
  .panel-list::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.08); border-radius:2px; }

  .panel-item {
    padding:9px 11px; margin:3px 0; border-radius:7px;
    cursor:pointer; font-size:11px; display:flex; align-items:center; gap:8px;
    transition:background 0.2s; color:#5a5a6e;
  }
  .panel-item:hover { background:rgba(51,112,255,0.06); }
  .panel-item.active { background:rgba(51,112,255,0.1); border-left:2px solid #3370ff; }

  .dev-icon {
    width:26px; height:26px; border-radius:6px; font-size:13px;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .dev-info { flex:1; min-width:0; }
  .dev-name { font-weight:600; color:#1a1a2e; }
  .dev-loc { font-size:10px; color:#8f959e; }
  .dev-badge { font-size:9px; padding:2px 6px; border-radius:3px; font-weight:600; white-space:nowrap; }
  .badge-ok { background:#e8f5e9; color:#2e7d32; }
  .badge-warn { background:#fff3e0; color:#e65100; }
  .badge-alert { background:#fbe9e7; color:#c62828; }

  .alarm-row {
    padding:8px 11px; margin:3px 0; border-radius:7px;
    font-size:10px; background:#fff5f5;
    border-left:2px solid rgba(234,67,53,0.5);
    display:flex; justify-content:space-between; align-items:center;
    color:#5a3a3a;
  }
  .alarm-time { color:#8f959e; font-size:9px; white-space:nowrap; }
</style>
</head>
<body>

<div id="title">🚉 <span>Central Station</span> · Digital Twin</div>

<div class="side-panel panel-left">
  <div class="panel-header"><span class="dot green"></span> IoT Devices</div>
  <div class="panel-list" id="deviceList"></div>
</div>

<div class="side-panel panel-right">
  <div class="panel-header"><span class="dot red"></span> Live Alerts</div>
  <div class="panel-list" id="alarmList"></div>
</div>

<div class="hint">🖱 Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-drag to pan &nbsp;·&nbsp; Click device to focus</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ==================== SCENE ====================
const scene = new THREE.Scene();
scene.background = new THREE.Color('#dce8f0');
scene.fog = new THREE.Fog('#dce8f0', 50, 100);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.5, 200);
camera.position.set(14, 18, 24);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 1);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2.15;
controls.minDistance = 6;
controls.maxDistance = 50;
controls.update();

// ==================== LIGHTING (DAYLIGHT) ====================
scene.add(new THREE.AmbientLight('#d0dce8', 2.5));

const sun = new THREE.DirectionalLight('#ffeedd', 6);
sun.position.set(20, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25; sun.shadow.camera.bottom = -25;
sun.shadow.camera.far = 70;
sun.shadow.bias = -0.0001;
scene.add(sun);

const fill = new THREE.DirectionalLight('#c8ddf8', 1.5);
fill.position.set(-8, 5, -5);
scene.add(fill);

// ==================== GROUND ====================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ color:'#c8d4de', roughness:0.85 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(80, 60, '#bcc8d4', '#bcc8d4');
grid.position.y = 0.005;
scene.add(grid);

// ==================== STATION FLOOR ====================
const stationFloor = new THREE.Mesh(
  new THREE.BoxGeometry(22, 0.35, 20),
  new THREE.MeshStandardMaterial({ color:'#e8ecf0', roughness:0.35, metalness:0.1 })
);
stationFloor.position.y = 0.18;
stationFloor.receiveShadow = true; stationFloor.castShadow = true;
scene.add(stationFloor);

// Decorative floor tiles
for (let x=-10; x<=10; x+=2.2) {
  for (let z=-9; z<=9; z+=2.2) {
    const tile = new THREE.Mesh(
      new THREE.PlaneGeometry(1.9, 1.9),
      new THREE.MeshStandardMaterial({
        color: Math.random()>0.5?'#eef1f5':'#e2e6ec',
        roughness:0.35, metalness:0.05
      })
    );
    tile.rotation.x = -Math.PI/2;
    tile.position.set(x, 0.37, z);
    tile.receiveShadow = true;
    scene.add(tile);
  }
}

// ==================== WALLS ====================
function wall(w, h, d, x, y, z, matOpts={}) {
  const defaults = { color:'#d8dce2', roughness:0.3, metalness:0.15 };
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ ...defaults, ...matOpts })
  );
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Outer walls — low, like open-air station
wall(22.4, 1.8, 0.25, 0, 1.0, +10, { color:'#d0d6dc' });
wall(22.4, 1.8, 0.25, 0, 1.0, -10, { color:'#d0d6dc' });
wall(0.25, 1.8, 20.5, +11.1, 1.0, 0, { color:'#d0d6dc' });
wall(0.25, 1.8, 20.5, -11.1, 1.0, 0, { color:'#d0d6dc' });

// ==================== COLUMNS ====================
[-10, -5, 0, 5, 10].forEach(x => {
  [-8, -4, 0, 4, 8].forEach(z => {
    const col = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.26, 2.0, 16),
      new THREE.MeshStandardMaterial({ color:'#e8ecf0', roughness:0.2, metalness:0.3 })
    );
    col.position.set(x, 1.1, z);
    col.castShadow = true; col.receiveShadow = true;
    scene.add(col);
  });
});

// ==================== PLATFORMS & TRACKS ====================
for (let t=-1; t<=1; t++) {
  const trackZ = 5 + t*3;
  // Gravel bed
  const bed = new THREE.Mesh(
    new THREE.BoxGeometry(20, 0.06, 1.0),
    new THREE.MeshStandardMaterial({ color:'#b8bcc0', roughness:0.9 })
  );
  bed.position.set(0, 0.22, trackZ);
  bed.receiveShadow = true;
  scene.add(bed);

  // Rails
  [-0.3, 0.3].forEach(offset => {
    const rail = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.05, 0.05),
      new THREE.MeshStandardMaterial({ color:'#9aa0a8', roughness:0.2, metalness:0.8 })
    );
    rail.position.set(0, 0.28, trackZ + offset);
    scene.add(rail);
  });
}

// Platforms
[-1, 0.5].forEach(offset => {
  const plat = new THREE.Mesh(
    new THREE.BoxGeometry(20, 0.45, 2.0),
    new THREE.MeshStandardMaterial({ color:'#e0e4ea', roughness:0.35, metalness:0.1 })
  );
  plat.position.set(0, 0.42, 5 + offset*3 + 1.5);
  plat.castShadow = true; plat.receiveShadow = true;
  scene.add(plat);

  // Yellow safety line
  [-0.85, 0.85].forEach(edge => {
    const line = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.01, 0.1),
      new THREE.MeshStandardMaterial({ color:'#ffaa00', roughness:0.1, emissive:'#ffaa00', emissiveIntensity:0.2 })
    );
    line.position.set(0, 0.66, 5 + offset*3 + 1.5 + edge);
    scene.add(line);
  });
});

// ==================== PASSENGER BRIDGE ====================
const bridgeDeck = new THREE.Mesh(
  new THREE.BoxGeometry(2.2, 0.25, 10),
  new THREE.MeshStandardMaterial({ color:'#e0e4ea', roughness:0.3, metalness:0.2 })
);
bridgeDeck.position.set(8, 1.35, 6.5);
bridgeDeck.castShadow = true; bridgeDeck.receiveShadow = true;
scene.add(bridgeDeck);

// Bridge roof
const bridgeRoof = new THREE.Mesh(
  new THREE.BoxGeometry(2.8, 0.12, 10.4),
  new THREE.MeshStandardMaterial({ color:'#d0d6dc', roughness:0.3, metalness:0.4 })
);
bridgeRoof.position.set(8, 2.0, 6.5);
bridgeRoof.castShadow = true;
scene.add(bridgeRoof);

// Bridge supports
[-4, 0, 4].forEach(z => {
  const sup = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.14, 1.8, 8),
    new THREE.MeshStandardMaterial({ color:'#d0d6dc', roughness:0.25, metalness:0.4 })
  );
  sup.position.set(8, 0.9, 6.5 + z);
  sup.castShadow = true;
  scene.add(sup);
});

// ==================== TRAIN (inside station!) ====================
const trainGroup = new THREE.Group();

// Engine body
const engine = new THREE.Mesh(
  new THREE.BoxGeometry(3.2, 1.5, 1.7),
  new THREE.MeshStandardMaterial({ color:'#f0f2f5', roughness:0.2, metalness:0.4 })
);
engine.position.set(0, 0.7, 0);
engine.castShadow = true;
trainGroup.add(engine);

// Red nose
const nose = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15, 0.55, 1.1, 16, 1, false, 0, Math.PI),
  new THREE.MeshStandardMaterial({ color:'#d43', roughness:0.15, metalness:0.5 })
);
nose.rotation.z = -Math.PI/2;
nose.rotation.y = Math.PI/2;
nose.position.set(1.8, 0.7, 0);
trainGroup.add(nose);

// Windshield
const windshield = new THREE.Mesh(
  new THREE.PlaneGeometry(0.7, 0.45),
  new THREE.MeshStandardMaterial({ color:'#88bbee', roughness:0.05, metalness:0.3 })
);
windshield.position.set(2.15, 1.05, 0);
trainGroup.add(windshield);

// Headlights
[-0.35, 0.35].forEach(off => {
  const hl = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 8, 8),
    new THREE.MeshStandardMaterial({ color:'#fff', roughness:0.1, emissive:'#ffeedd', emissiveIntensity:0.6 })
  );
  hl.position.set(2.2, 0.65, off);
  trainGroup.add(hl);
});

// Carriages
for (let c=0; c<3; c++) {
  const car = new THREE.Mesh(
    new THREE.BoxGeometry(3.8, 1.35, 1.6),
    new THREE.MeshStandardMaterial({ color:'#eceef2', roughness:0.25, metalness:0.35 })
  );
  car.position.set(-2.7 - c*4.0, 0.62, 0);
  car.castShadow = true;
  trainGroup.add(car);

  // Windows
  for (let w=-1; w<=1; w+=2) {
    const win = new THREE.Mesh(
      new THREE.PlaneGeometry(1.1, 0.5),
      new THREE.MeshStandardMaterial({ color:'#aaccee', roughness:0.05, emissive:'#446688', emissiveIntensity:0.2 })
    );
    win.position.set(-2.7 - c*4.0, 0.95, w*0.45);
    trainGroup.add(win);
  }

  // Roof AC unit
  const ac = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.18, 0.8),
    new THREE.MeshStandardMaterial({ color:'#d0d4d8', roughness:0.4, metalness:0.3 })
  );
  ac.position.set(-2.7 - c*4.0, 1.4, 0);
  trainGroup.add(ac);
}

// Position train inside station on middle track
trainGroup.position.set(-3, 0.55, 5);
scene.add(trainGroup);

// ==================== DEVICE MARKERS ====================
const devices = [
  { id:'d1', name:'Passenger Counter A', loc:'Platform 1', x:-8, z:6.5, color:'#34a853', status:'ok', type:'counter' },
  { id:'d2', name:'Passenger Counter B', loc:'Platform 2', x:0, z:9.5, color:'#fbbc04', status:'warn', type:'counter' },
  { id:'d3', name:'Security Camera C1', loc:'Main Hall', x:-6, z:-6, color:'#34a853', status:'ok', type:'camera' },
  { id:'d4', name:'Security Camera C2', loc:'Entrance', x:6, z:-9, color:'#34a853', status:'ok', type:'camera' },
  { id:'d5', name:'Info Display D1', loc:'Platform 1', x:4, z:6.5, color:'#34a853', status:'ok', type:'display' },
  { id:'d6', name:'Info Display D2', loc:'Platform 2', x:-3, z:9.2, color:'#ea4335', status:'alert', type:'display' },
  { id:'d7', name:'Temp Sensor T1', loc:'Waiting Area', x:8, z:-3, color:'#34a853', status:'ok', type:'sensor' },
  { id:'d8', name:'Crowd Density S1', loc:'Main Hall', x:0, z:3, color:'#fbbc04', status:'warn', type:'crowd' },
  { id:'d9', name:'Security Camera C3', loc:'Bridge', x:8.5, z:8, color:'#34a853', status:'ok', type:'camera' },
  { id:'d10', name:'Gate Scanner G1', loc:'Entrance', x:8, z:-9, color:'#34a853', status:'ok', type:'gate' },
];

const deviceMeshes = [];
const allRings = [];

devices.forEach(d => {
  const group = new THREE.Group();

  const glowGeo = new THREE.SphereGeometry(0.25, 32, 32);
  const intensity = d.status==='alert'?1.1 : d.status==='warn'?0.6 : 0.35;
  const glowMat = new THREE.MeshStandardMaterial({
    color:d.color, roughness:0.1, metalness:0.1,
    emissive:d.color, emissiveIntensity:intensity
  });
  const sphere = new THREE.Mesh(glowGeo, glowMat);
  sphere.castShadow = true;
  group.add(sphere);

  const ringGeo = new THREE.TorusGeometry(0.38, 0.04, 16, 32);
  const ringMat = new THREE.MeshStandardMaterial({
    color:d.color, roughness:0.15, emissive:d.color,
    emissiveIntensity:0.5, transparent:true, opacity:0.65
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  ring.userData = { speed:0.35 + Math.random()*0.4, phase:Math.random()*Math.PI*2 };
  group.add(ring);
  allRings.push(ring);

  if (d.type==='camera') {
    const pole = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 1.6, 8),
      new THREE.MeshStandardMaterial({ color:'#889098', roughness:0.3, metalness:0.5 })
    );
    pole.position.y = 0.15;
    group.add(pole);
  }

  group.position.set(d.x, d.type==='camera'?0.95:0.48, d.z);
  scene.add(group);
  d.group = group;

  const div = document.createElement('div');
  const icon = d.status==='alert'?'🔴':d.status==='warn'?'🟡':'🟢';
  div.innerHTML = `<span style="font-size:9px">${icon}</span> <span style="color:#1a1a2e;font-size:10px;font-weight:500">${d.name.split(' ').pop()}</span>`;
  div.style.cssText = 'background:rgba(255,255,255,0.88);padding:3px 7px;border-radius:4px;white-space:nowrap;pointer-events:none;border:1px solid rgba(0,0,0,0.06)';
  const label = new CSS2DObject(div);
  label.position.set(0, d.type==='camera'?1.1:0.55, 0);
  group.add(label);

  deviceMeshes.push({ device:d, group });
});

// ==================== ZONE LABELS ====================
const zones = [
  { name:'PLATFORM 1', x:-8, z:6.8, color:'#3370ff' },
  { name:'PLATFORM 2', x:0, z:9.8, color:'#3370ff' },
  { name:'WAITING HALL', x:8, z:-3, color:'#e67e22' },
  { name:'TICKET HALL', x:-8, z:-4, color:'#27ae60' },
  { name:'ENTRANCE', x:5, z:-9.5, color:'#8e44ad' },
];

zones.forEach(z => {
  const div = document.createElement('div');
  div.textContent = z.name;
  div.style.cssText = `color:${z.color};font-size:10px;font-weight:700;letter-spacing:0.8px;white-space:nowrap;pointer-events:none`;
  const label = new CSS2DObject(div);
  label.position.set(z.x, 0.48, z.z);
  scene.add(label);
});

// ==================== UI ====================
function renderDeviceList() {
  const icons = { counter:'👥', camera:'📹', display:'🖥', sensor:'🌡️', crowd:'📊', gate:'🚪' };
  document.getElementById('deviceList').innerHTML = devices.map(d => `
    <div class="panel-item" data-id="${d.id}" onclick="window._focusById('${d.id}')">
      <div class="dev-icon" style="background:${d.color}12">${icons[d.type]}</div>
      <div class="dev-info">
        <div class="dev-name">${d.name}</div>
        <div class="dev-loc">${d.loc}</div>
      </div>
      <div class="dev-badge ${d.status==='ok'?'badge-ok':d.status==='warn'?'badge-warn':'badge-alert'}">${d.status==='ok'?'OK':d.status==='warn'?'WARN':'ALERT'}</div>
    </div>
  `).join('');
}

function highlightDevice(id) {
  document.querySelectorAll('.panel-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'center' }); }
}

window._focusById = function(id) {
  const entry = deviceMeshes.find(d => d.device.id === id);
  if (entry) {
    const pos = entry.group.position;
    controls.target.set(pos.x, pos.y, pos.z);
    controls.update();
    highlightDevice(id);
  }
};

renderDeviceList();

document.getElementById('alarmList').innerHTML = [
  { time:'14:32', text:'Info Display D2 — Signal Lost' },
  { time:'14:15', text:'Crowd Density S1 — Above Threshold' },
  { time:'13:48', text:'Passenger Counter B — Data Lag' },
].map(a => `
  <div class="alarm-row">
    <span>⚠ ${a.text}</span>
    <span class="alarm-time">${a.time}</span>
  </div>
`).join('');

// ==================== RAYCASTER ====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = deviceMeshes.map(d => d.group.children[0]);
  const intersects = raycaster.intersectObjects(targets);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const found = deviceMeshes.find(d => d.group.children.includes(obj));
    if (found) window._focusById(found.device.id);
  }
});

// ==================== ANIMATION ====================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  allRings.forEach(ring => {
    const s = 1 + Math.sin(t * ring.userData.speed + ring.userData.phase) * 0.28;
    ring.scale.setScalar(s);
    ring.material.opacity = 0.2 + Math.sin(t * ring.userData.speed + ring.userData.phase) * 0.25;
  });

  // Subtle train idle
  trainGroup.position.x = -3 + Math.sin(t * 0.5) * 0.12;

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
