<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能办公空间 · 3D 可视化</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { overflow:hidden; background:#eef1f5; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #info {
    position:absolute; top:20px; left:50%; transform:translateX(-50%);
    color:#1a1a2e; font-size:20px; font-weight:700;
    background:rgba(255,255,255,0.92); padding:10px 26px; border-radius:10px;
    pointer-events:none; backdrop-filter:blur(12px);
    border:1px solid rgba(0,0,0,0.06); box-shadow:0 2px 12px rgba(0,0,0,0.05);
  }
  .hint {
    position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
    color:#8f959e; font-size:12px; pointer-events:none;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.35; }
  }
  @keyframes float {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-5px); }
  }

  /* Side Panels */
  .side-panel {
    position:absolute; top:100px; bottom:30px; width:250px;
    background:rgba(255,255,255,0.92); backdrop-filter:blur(16px);
    border:1px solid rgba(0,0,0,0.06); border-radius:14px;
    padding:0; display:flex; flex-direction:column;
    z-index:10; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
  }
  .panel-left { left:16px; }
  .panel-right { right:16px; }

  .panel-header {
    padding:14px 16px 12px;
    font-size:14px; font-weight:700;
    border-bottom:1px solid rgba(0,0,0,0.06);
    display:flex; align-items:center; gap:8px;
  }
  .panel-left .panel-header { color:#3370ff; }
  .panel-right .panel-header { color:#f54a45; }

  .panel-list {
    flex:1; overflow-y:auto; padding:8px;
  }
  .panel-item {
    padding:10px 12px; margin:4px 0; border-radius:8px;
    cursor:pointer; font-size:12px; display:flex; align-items:center; gap:8px;
    transition:background 0.2s;
  }
  .panel-item:hover { background:#f0f4ff; }
  .panel-item.active { background:#e8f0ff; }

  .dev-icon {
    width:28px; height:28px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; flex-shrink:0;
  }
  .dev-info { flex:1; min-width:0; }
  .dev-name { font-weight:600; color:#1a1a2e; }
  .dev-zone { font-size:10px; color:#8f959e; }
  .dev-status { font-size:10px; padding:2px 6px; border-radius:3px; font-weight:500; white-space:nowrap; }
  .status-ok { background:#e8f5e9; color:#2e7d32; }
  .status-warn { background:#fff3e0; color:#e65100; }
  .status-off { background:#f5f5f5; color:#9e9e9e; }

  .alarm-item {
    padding:10px 12px; margin:4px 0; border-radius:8px;
    font-size:11px; background:#fff5f5; border-left:3px solid #f54a45;
    display:flex; justify-content:space-between; align-items:center;
  }
  .alarm-time { color:#8f959e; font-size:10px; white-space:nowrap; }
</style>
</head>
<body>

<div id="info">🏢 智能办公空间 · 3D 可视化</div>

<div class="side-panel panel-left">
  <div class="panel-header">📡 设备列表</div>
  <div class="panel-list" id="deviceList"></div>
</div>

<div class="side-panel panel-right">
  <div class="panel-header">🔔 实时告警</div>
  <div class="panel-list" id="alarmList"></div>
</div>

<div class="hint">🖱 拖拽旋转 · 滚轮缩放 · 右键平移 · 点击设备聚焦</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ===== Scene Setup =====
const scene = new THREE.Scene();
scene.background = new THREE.Color('#eef1f5');
scene.fog = new THREE.Fog('#eef1f5', 40, 80);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.5, 200);
camera.position.set(16, 20, 22);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2.1;
controls.minDistance = 8;
controls.maxDistance = 50;
controls.update();

// ===== Lighting =====
scene.add(new THREE.AmbientLight('#ffffff', 1.8));
const sun = new THREE.DirectionalLight('#ffffff', 3.5);
sun.position.set(15, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -20; sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20; sun.shadow.camera.bottom = -20;
sun.shadow.camera.far = 60;
sun.shadow.bias = -0.0001;
scene.add(sun);
scene.add(new THREE.DirectionalLight('#c8d6ff', 0.8).translateX(-8));

// ===== Ground =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color:'#dce0e8', roughness:0.85 })
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// ===== Grid Helper =====
const grid = new THREE.GridHelper(60, 40, '#d0d4dc', '#d0d4dc');
grid.position.y = 0.005;
scene.add(grid);

// ===== Building Platform =====
const platform = new THREE.Mesh(
  new THREE.BoxGeometry(16, 0.3, 20),
  new THREE.MeshStandardMaterial({ color:'#c8ccd4', roughness:0.5 })
);
platform.position.y = 0.15;
platform.receiveShadow = true; platform.castShadow = true;
scene.add(platform);

// ===== Walls =====
function wall(w, h, d, x, y, z, color='#e8eaed') {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color, roughness:0.4, metalness:0.05 })
  );
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Outer walls
wall(16, 2.8, 0.25, 0, 1.4, +10);     // back
wall(16, 2.8, 0.25, 0, 1.4, -10);     // front
wall(0.25, 2.8, 20, +8, 1.4, 0);      // right
wall(0.25, 2.8, 20, -8, 1.4, 0);      // left

// Internal partitions
wall(0.15, 2.6, 9, -3.5, 1.3, +5.5);  // left meeting room divider
wall(5.5, 2.6, 0.15, -6.25, 1.3, -1); // bottom-left office divider
wall(7, 2.6, 0.15, 0.5, 1.3, +1);     // center divider
wall(0.15, 2.6, 8, 3.5, 1.3, -6);     // right office divider

// ===== Floor Texture =====
const floorMat = new THREE.MeshStandardMaterial({ color:'#f5f6f8', roughness:0.6 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(15.6, 19.6), floorMat);
floor.rotation.x = -Math.PI/2; floor.position.y = 0.31; floor.receiveShadow = true;
scene.add(floor);

// Zone labels
const zones = [
  { name:'开放办公区', x:-4.5, z:-5, w:7.5, d:8, color:'#e8f0fe' },
  { name:'会议室 A', x:-5.5, z:6.5, w:3.5, d:3, color:'#fce8e6' },
  { name:'会议室 B', x:-1.5, z:6.5, w:3.5, d:3, color:'#fce8e6' },
  { name:'茶水间', x:5.5, z:-6, w:3, d:4, color:'#e8f5e9' },
  { name:'前台', x:0, z:9, w:3, d:1.5, color:'#fff8e1' },
  { name:'独立办公室', x:5.5, z:6, w:3, d:3.5, color:'#f3e8fd' },
];

zones.forEach(z => {
  const mat = new THREE.MeshStandardMaterial({ color:z.color, roughness:0.7, transparent:true, opacity:0.4 });
  const zoneFloor = new THREE.Mesh(new THREE.PlaneGeometry(z.w, z.d), mat);
  zoneFloor.rotation.x = -Math.PI/2; zoneFloor.position.set(z.x, 0.32, z.z);
  zoneFloor.receiveShadow = true;
  scene.add(zoneFloor);

  const div = document.createElement('div');
  div.textContent = z.name;
  div.style.cssText = 'color:#646a73;font-size:11px;font-weight:600;white-space:nowrap;text-align:center;pointer-events:none';
  const label = new CSS2DObject(div);
  label.position.set(z.x, 0.35, z.z);
  scene.add(label);
});

// ===== Device Markers =====
const devices = [
  { id:'d1', name:'温湿度传感器-A1', zone:'开放办公区', x:-6, z:-7, color:'#34a853', status:'ok', type:'sensor' },
  { id:'d2', name:'温湿度传感器-A2', zone:'开放办公区', x:-2, z:-3, color:'#34a853', status:'ok', type:'sensor' },
  { id:'d3', name:'人体感应器-B1', zone:'会议室 A', x:-5.5, z:5.5, color:'#fbbc04', status:'warn', type:'motion' },
  { id:'d4', name:'空气质量监测-C1', zone:'茶水间', x:6, z:-7, color:'#34a853', status:'ok', type:'air' },
  { id:'d5', name:'智能灯光-D1', zone:'前台', x:-1, z:9.2, color:'#34a853', status:'ok', type:'light' },
  { id:'d6', name:'智能灯光-D2', zone:'独立办公室', x:6, z:5, color:'#ea4335', status:'off', type:'light' },
  { id:'d7', name:'温湿度传感器-A3', zone:'开放办公区', x:-7, z:-1.5, color:'#34a853', status:'ok', type:'sensor' },
  { id:'d8', name:'人体感应器-B2', zone:'会议室 B', x:-1.5, z:5.5, color:'#34a853', status:'ok', type:'motion' },
];

const deviceMeshes = [];
const rings = [];

devices.forEach(d => {
  const group = new THREE.Group();

  // Base sphere
  const geo = new THREE.SphereGeometry(0.22, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color:d.color, roughness:0.25, metalness:0.15, emissive:d.color, emissiveIntensity:0.3 });
  const sphere = new THREE.Mesh(geo, mat);
  sphere.castShadow = true;
  group.add(sphere);

  // Pulse ring
  const ringGeo = new THREE.TorusGeometry(0.32, 0.04, 16, 32);
  const ringMat = new THREE.MeshStandardMaterial({ color:d.color, roughness:0.3, emissive:d.color, emissiveIntensity:0.5, transparent:true, opacity:0.7 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI/2;
  ring.userData = { baseY: d.status==='off'?0.25:3.0, speed: 0.4 + Math.random()*0.3, phase: Math.random()*Math.PI*2 };
  group.add(ring);
  rings.push(ring);

  group.position.set(d.x, 0.46, d.z);
  scene.add(group);
  d.group = group;

  // CSS Label
  const div = document.createElement('div');
  div.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:4px;vertical-align:middle"></span>${d.name}`;
  div.style.cssText = `color:#1a1a2e;font-size:10px;font-weight:500;white-space:nowrap;background:rgba(255,255,255,0.85);padding:3px 8px;border-radius:4px;pointer-events:none`;
  const label = new CSS2DObject(div);
  label.position.set(0, 0.55, 0);
  group.add(label);

  deviceMeshes.push({ device:d, group });
});

// ===== Furniture (simple) =====
// Desks in open area
for (let i=0; i<6; i++) {
  const deskGroup = new THREE.Group();
  const desk = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.05, 0.6),
    new THREE.MeshStandardMaterial({ color:'#f0f0f0', roughness:0.4 })
  );
  desk.position.y = 0.33;
  desk.castShadow = true; desk.receiveShadow = true;
  deskGroup.add(desk);
  deskGroup.position.set(-6 + (i%3)*2.2, 0.31, -6 + Math.floor(i/3)*2.5);
  scene.add(deskGroup);
}

// Meeting tables
function addTable(x, z) {
  const t = new THREE.Mesh(
    new THREE.CylinderGeometry(1.2, 1.2, 0.08, 32),
    new THREE.MeshStandardMaterial({ color:'#e8eaed', roughness:0.3 })
  );
  t.position.set(x, 0.35, z);
  t.castShadow = true; t.receiveShadow = true;
  scene.add(t);
}
addTable(-5.5, 6.5);
addTable(-1.5, 6.5);

// ===== Raycaster for click =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onCanvasClick(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const targets = deviceMeshes.map(d => d.group.children[0]); // spheres
  const intersects = raycaster.intersectObjects(targets);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const found = deviceMeshes.find(d => d.group.children.includes(obj));
    if (found) focusDevice(found);
  }
}

function focusDevice(entry) {
  const pos = entry.group.position;
  controls.target.set(pos.x, pos.y, pos.z);
  controls.update();
  highlightDevice(entry.device.id);
}

renderer.domElement.addEventListener('click', onCanvasClick);

// ===== UI Panels =====
function renderDeviceList() {
  const el = document.getElementById('deviceList');
  el.innerHTML = devices.map(d => `
    <div class="panel-item" data-id="${d.id}" onclick="window._focusById('${d.id}')">
      <div class="dev-icon" style="background:${d.color}20">${d.type==='sensor'?'🌡️':d.type==='motion'?'👤':d.type==='air'?'💨':'💡'}</div>
      <div class="dev-info">
        <div class="dev-name">${d.name}</div>
        <div class="dev-zone">${d.zone}</div>
      </div>
      <div class="dev-status ${d.status==='ok'?'status-ok':d.status==='warn'?'status-warn':'status-off'}">${d.status==='ok'?'正常':d.status==='warn'?'注意':'离线'}</div>
    </div>
  `).join('');
}

function highlightDevice(id) {
  document.querySelectorAll('.panel-item').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'center' }); }
}

window._focusById = function(id) {
  const entry = deviceMeshes.find(d => d.device.id === id);
  if (entry) focusDevice(entry);
};

renderDeviceList();

// Alarm list
const alarms = [
  { time:'10:32', text:'智能灯光-D2 离线超过 30 分钟', level:'high' },
  { time:'09:15', text:'人体感应器-B1 数据延迟', level:'medium' },
];
document.getElementById('alarmList').innerHTML = alarms.map(a => `
  <div class="alarm-item">
    <span>${a.text}</span>
    <span class="alarm-time">${a.time}</span>
  </div>
`).join('');

// ===== Animation Loop =====
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  rings.forEach(ring => {
    const s = 1 + Math.sin(t * ring.userData.speed + ring.userData.phase) * 0.25;
    ring.scale.setScalar(s);
    ring.material.opacity = 0.25 + Math.sin(t * ring.userData.speed + ring.userData.phase) * 0.25;
  });

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
